name: Test and build evaluator

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run contract and unit tests
        run: python -m unittest discover -s tests -v

      - name: Lint
        run: ruff check .

      - uses: docker/setup-buildx-action@v3

      - name: Build Linux AMD64 evaluator
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: ghcr.io/georgexxe/stylecap:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/Georgexxe/stylecap
